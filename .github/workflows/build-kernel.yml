name: Build Kernel with SukiSU Ultra (SUSFS)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc clang-14 lld-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi flex bison libssl-dev bc rsync

    - name: Clone SukiSU Ultra (SUSFS)
      run: |
        git clone --depth=1 https://github.com/SK-Aeveyn233/SukiSU -b susfs-dev KernelSU

    - name: Enable SUSFS for 4.19
      run: |
        echo "CONFIG_KSU=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU_SUSFS_HIDE_MOUNTS=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> arch/arm64/configs/ls12_mt8797_wifi_64_defconfig

    - name: Build kernel
      run: |
        export PATH=/usr/lib/llvm-14/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        make ARCH=arm64 ls12_mt8797_wifi_64_defconfig
        make -j$(nproc) ARCH=arm64 CC=clang Image

    - name: Make AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp arch/arm64/boot/Image AnyKernel3/
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        cd AnyKernel3
        zip -r ../AnyKernel3-SukiSU-4.19.zip *

    - name: Upload AnyKernel3
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-SukiSU-SUSFS-4.19
        path: AnyKernel3-SukiSU-4.19.zip
