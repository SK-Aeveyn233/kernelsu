name: Build Kernel with SukiSU Ultra
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Setup tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc clang-14 lld-14 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi flex bison libssl-dev bc rsync

    - name: Clone SukiSU Ultra
      run: |
        git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra -b nongki KernelSU

    - name: Build kernel
      run: |
        export PATH=/usr/lib/llvm-14/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        make ARCH=arm64 ls12_mt8797_wifi_64_defconfig
        make -j$(nproc) ARCH=arm64 CC=clang Image

    - name: Make AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp arch/arm64/boot/Image AnyKernel3/
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        cd AnyKernel3
        zip -r ../AnyKernel3-SukiSU-Ultra.zip *

    - name: Upload AnyKernel3
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-SukiSU-Ultra
        path: AnyKernel3-SukiSU-Ultra.zip
